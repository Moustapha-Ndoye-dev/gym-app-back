  <circle cx="1020" cy="100" r="140" fill="url(#orb)" filter="url(#b)"/>
  <rect x="56" y="56" width="5" height="132" rx="2.5" fill="url(#accent)"/>
  <text x="80" y="124" font-family="ui-sans-serif,system-ui,-apple-system,sans-serif" font-size="52" font-weight="800" letter-spacing="-0.02em" fill="#f8fafc">Gym Central</text>
  <text x="80" y="176" font-family="ui-sans-serif,system-ui,sans-serif" font-size="26" font-weight="600" fill="#7dd3fc">API Backend</text>
  <text x="80" y="228" font-family="ui-monospace,SFMono-Regular,monospace" font-size="14" fill="#94a3b8">REST ∑ Multi-tenant ∑ JWT ∑ Prisma ∑ Express ∑ Zod ∑ OpenAPI</text>
  <text x="80" y="268" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#64748b">Couche donnťes &amp; sťcuritť pour les applications salle de sport</text>
  <g transform="translate(900 96)" fill="none" stroke="#38bdf8" stroke-opacity="0.35" stroke-width="2">
